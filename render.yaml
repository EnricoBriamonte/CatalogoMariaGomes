services:
  - type: web
    name: catalogo-mahluz
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: EnricoBriamonte/CatalogoMariaGomes
      - key: GITHUB_BRANCH
        value: main
